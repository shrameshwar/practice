name: this is practice workflow
on: push
jobs: 
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: Setup node-job
        uses: actions/setup-node@v6
        with:
          node-version: "18"
      - name: Install depndencies
        run: npm ci
      - name: run lint
        run: npm run lint
      - name: Run test
        run: npm test
      - name: Deploy
        run: npm run build